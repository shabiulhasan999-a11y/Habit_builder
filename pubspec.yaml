name: habit_builder
description: A premium habit tracker with streaks, heatmap, and local notifications.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.2.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^4.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

  # Animations
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
